name: Daily VAHAN ETL

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST (UTC+5:30 → 03:30 UTC)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date YYYY-MM-DD (default: yesterday)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (extract but skip DB writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  extract:
    name: VAHAN Daily Extraction
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install Python dependencies
        working-directory: etl
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: etl
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run daily ETL extraction
        working-directory: etl
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="--date ${{ github.event.inputs.target_date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m autoquant_etl extract-daily --verbose $ARGS

      - name: Run pipeline monitor
        working-directory: etl
        if: always()
        run: |
          python -m autoquant_etl monitor --digest

      - name: Upload extraction logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: etl-failure-logs-${{ github.run_id }}
          path: etl/*.log
          retention-days: 7

  # Optional: run monitor as a separate follow-up step
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: extract
    if: failure()
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install Python dependencies
        working-directory: etl
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send failure alert
        working-directory: etl
        run: |
          python -c "
          import asyncio
          from autoquant_etl.config import Settings
          from autoquant_etl.utils.alerts import send_telegram_alert

          async def main():
              settings = Settings()
              await send_telegram_alert(
                  settings=settings,
                  message='❌ *AutoQuant ETL* — Daily extraction FAILED\n'
                          'Run: \`${{ github.run_id }}\`\n'
                          'Branch: \`${{ github.ref_name }}\`\n'
                          'Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              )

          asyncio.run(main())
          "
