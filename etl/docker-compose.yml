version: '3.8'

services:
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./autoquant_etl:/app/autoquant_etl
      - ./seeds:/app/seeds
    command: python -m autoquant_etl health
    restart: "no"

