# ===========================================================================
# AutoQuant ETL — Railway Deployment Config
# ===========================================================================
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m autoquant_etl extract-daily"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Cron jobs (Railway Cron service)
# Note: Set these up in the Railway dashboard as separate services
# Extract Daily:    0 30 0 * * *   -> python -m autoquant_etl extract-daily
# Monitor Digest:   0 30 7 * * *   -> python -m autoquant_etl monitor --digest
# Weekly Backfill:  0 30 20 * * 6  -> python -m autoquant_etl backfill ...
# Monthly Recon:    0 30 4 5 * *   -> python -m autoquant_etl reconcile ...
